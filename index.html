<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FMODE // PRO MINIMAL</title>

    <!-- UI Dependencies -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        /* 
         * ============================================================
         * 1. THE MONOCHROME DESIGN SYSTEM
         * ============================================================
         */
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --elevated: #111111;
            --border: #1a1a1a;
            --border-bright: #333333;
            
            --text-main: #ffffff;
            --text-dim: #707070;
            --text-dark: #3a3a3a;
            
            --accent: #ffffff;
            
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-head: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --header-h: 80px;
            --sidebar-w: 260px;
            
            --ts: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* 
         * ============================================================
         * 2. GLOBAL RESET & FOUNDATION
         * ============================================================
         */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh; width: 100vw;
            overflow: hidden; display: flex;
        }

        button { cursor: pointer; border: none; background: none; color: inherit; font-family: inherit; transition: var(--ts); }
        img { max-width: 100%; display: block; }
        
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 10px; }

        /* 
         * ============================================================
         * 3. THE SHELL ARCHITECTURE
         * ============================================================
         */
        #fmode-shell { display: flex; width: 100%; height: 100%; }

        /* Sidebar: Professional Navigation */
        #sidebar {
            width: var(--sidebar-w); height: 100%;
            background: var(--bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 1000;
        }

        .brand {
            height: var(--header-h); display: flex; align-items: center;
            padding: 0 2rem; border-bottom: 1px solid var(--border);
            font-family: var(--font-head); font-weight: 700; font-size: 1.25rem;
            letter-spacing: -1.5px;
        }

        .nav-list { flex: 1; padding: 2rem 1rem; overflow-y: auto; }
        .nav-label {
            font-size: 0.65rem; color: var(--text-dark); text-transform: uppercase;
            font-weight: 800; letter-spacing: 0.15em; margin: 1.5rem 1rem 0.75rem;
        }

        .nav-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 1rem; border-radius: 4px;
            color: var(--text-dim); font-size: 0.9rem; font-weight: 500;
        }

        .nav-item:hover, .nav-item.active { color: var(--text-main); background: var(--surface); }
        .nav-item i { width: 18px; height: 18px; }

        /* Main Viewport */
        #viewport { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

        header {
            height: var(--header-h); padding: 0 2.5rem;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); background: var(--bg);
        }

        .search-box { position: relative; width: 100%; max-width: 400px; }
        .search-box i { position: absolute; left: 0; top: 50%; transform: translateY(-50%); color: var(--text-dark); width: 16px; }
        .search-box input {
            width: 100%; background: transparent; border: none;
            padding: 12px 0 12px 32px; color: var(--text-main);
            font-size: 0.85rem; outline: none; border-bottom: 1px solid transparent;
        }
        .search-box input:focus { border-bottom-color: var(--border-bright); }

        .sys-controls { display: flex; align-items: center; gap: 1.5rem; }
        .lang-switch { display: flex; gap: 10px; font-size: 0.7rem; font-weight: 700; color: var(--text-dark); }
        .lang-switch span { cursor: pointer; transition: 0.2s; }
        .lang-switch span.active { color: var(--text-main); }

        /* 
         * ============================================================
         * 4. DATA GRID & CARDS
         * ============================================================
         */
        #scroller { flex: 1; overflow-y: auto; padding: 3rem 2.5rem; -webkit-overflow-scrolling: touch; }

        .view-meta { margin-bottom: 3rem; }
        .view-meta h1 { font-family: var(--font-head); font-size: 2.25rem; font-weight: 700; letter-spacing: -1.5px; }
        .view-meta p { color: var(--text-dim); margin-top: 8px; font-size: 0.95rem; }

        .match-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .fm-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 4px; overflow: hidden; position: relative;
            transition: var(--ts); opacity: 0; transform: translateY(15px);
        }

        .fm-card.visible { opacity: 1; transform: translateY(0); }
        .fm-card:hover { border-color: var(--border-bright); background: var(--elevated); }

        /* The Intelligent Poster Logic */
        .fm-poster-wrap { aspect-ratio: 16/9; background: #000; overflow: hidden; position: relative; border-bottom: 1px solid var(--border); }
        .fm-poster-wrap img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: grayscale(1); transition: 0.8s; }
        .fm-card:hover .fm-poster-wrap img { opacity: 0.8; filter: grayscale(0); transform: scale(1.03); }

        .fm-info { padding: 1.5rem; }
        .fm-cat { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem; }

        .fm-teams { display: flex; flex-direction: column; gap: 12px; }
        .fm-team { display: flex; align-items: center; gap: 12px; }
        .fm-team img { width: 24px; height: 24px; object-fit: contain; }
        .fm-team span { font-weight: 600; font-size: 0.95rem; letter-spacing: -0.5px; }

        .live-tag {
            position: absolute; top: 1rem; right: 1rem;
            background: #fff; color: #000; padding: 4px 8px;
            font-size: 0.6rem; font-weight: 900; letter-spacing: 1px; z-index: 10;
        }

        /* 
         * ============================================================
         * 5. CINEMA SYSTEM (iPhone Secure)
         * ============================================================
         */
        #cinema {
            position: fixed; inset: 0; background: #000; z-index: 5000;
            display: none; flex-direction: column;
        }

        .cinema-top {
            height: 70px; padding: var(--safe-top) 2rem 0;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .cinema-mid { flex: 1; position: relative; background: #000; }
        #player-frame { width: 100%; height: 100%; border: none; }

        #shield {
            position: absolute; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .shield-btn {
            border: 1px solid #fff; padding: 12px 24px; text-transform: uppercase;
            font-size: 0.7rem; font-weight: 800; letter-spacing: 2px;
        }

        /* The iPhone Source Scroll Fix */
        .cinema-bot {
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 1rem 2rem calc(1rem + var(--safe-bottom));
            display: flex; gap: 12px; overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .src-btn {
            flex: 0 0 auto; background: var(--elevated); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 2px; color: var(--text-dim);
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }
        .src-btn.active { color: #000; background: #fff; border-color: #fff; }

        /* 
         * ============================================================
         * 6. MOBILE NAVIGATION
         * ============================================================
         */
        #mobile-tabs {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: calc(70px + var(--safe-bottom)); background: var(--bg);
            border-top: 1px solid var(--border); display: none;
            justify-content: space-around; align-items: center;
            padding-bottom: var(--safe-bottom); z-index: 1000;
        }

        @media (max-width: 1024px) {
            #sidebar { display: none; }
            #mobile-tabs { display: flex; }
            header { padding: 0 1.5rem; }
            #scroller { padding: 2rem 1.5rem 100px; }
            .view-meta h1 { font-size: 1.75rem; }
        }

        @media (max-width: 600px) {
            .match-grid { grid-template-columns: 1fr; }
            .search-box { display: none; }
        }
    </style>
</head>
<body>

    <div id="fmode-shell">
        <!-- Persistent Sidebar -->
        <aside id="sidebar">
            <div class="brand">FMODE // TV</div>
            <div class="nav-list">
                <div class="nav-label" id="txt-browse">Explore</div>
                <button class="nav-item active" onclick="Engine.setView('live')" id="nav-live">
                    <i data-lucide="zap"></i> <span id="txt-live">Live Streams</span>
                </button>
                <button class="nav-item" onclick="Engine.setView('schedule')" id="nav-schedule">
                    <i data-lucide="calendar"></i> <span id="txt-schedule">Schedule</span>
                </button>

                <div class="nav-label" id="txt-lang">Language</div>
                <button class="nav-item" onclick="Engine.setLang('en')"><span>ENGLISH</span></button>
                <button class="nav-item" onclick="Engine.setLang('es')"><span>ESPAÑOL</span></button>
                <button class="nav-item" onclick="Engine.setLang('fr')"><span>FRANÇAIS</span></button>
            </div>
        </aside>

        <!-- Main Interface -->
        <main id="viewport">
            <header>
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="global-search" placeholder="Search competitions, teams...">
                </div>
                <div class="sys-controls">
                    <div class="lang-switch">
                        <span onclick="Engine.setLang('en')" id="l-en" class="active">EN</span>
                        <span onclick="Engine.setLang('es')" id="l-es">ES</span>
                        <span onclick="Engine.setLang('fr')" id="l-fr">FR</span>
                    </div>
                    <div id="clock" style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dark);">00:00</div>
                </div>
            </header>

            <section id="scroller">
                <div class="view-meta">
                    <h1 id="view-title">Live Stadium</h1>
                    <p id="view-desc">Experience global sports in monochrome precision.</p>
                </div>

                <div class="match-grid" id="grid-mount">
                    <!-- Cards injected by Engine -->
                </div>
            </section>
        </main>

        <!-- iPhone Tab Bar -->
        <nav id="mobile-tabs">
            <button onclick="Engine.setView('live')"><i data-lucide="zap"></i></button>
            <button onclick="Engine.setView('schedule')"><i data-lucide="calendar"></i></button>
            <button onclick="Cinema.close()"><i data-lucide="x"></i></button>
        </nav>
    </div>

    <!-- Cinema Layer -->
    <div id="cinema">
        <div class="cinema-top">
            <div id="active-title" style="font-family: var(--font-head); font-weight: 700; font-size: 0.8rem; letter-spacing: 1px;">STREAM GATEWAY</div>
            <button onclick="Cinema.close()"><i data-lucide="chevron-down"></i></button>
        </div>
        <div class="cinema-mid">
            <div id="shield" onclick="Cinema.unlock()">
                <div class="shield-btn" id="txt-unlock">Tap to Access Player</div>
            </div>
            <div id="player-mount" style="width: 100%; height: 100%;"></div>
        </div>
        <div class="cinema-bot" id="source-mount">
            <!-- iPhone Optimized Source Selection -->
        </div>
    </div>

    <script>
        /* 
         * ============================================================
         * 7. CORE ENGINE ARCHITECTURE
         * ============================================================
         */
        
        const API_BASE = "https://streamed.pk";
        const I18N = {
            en: { browse: "Explore", live: "Live Streams", schedule: "Schedule", lang: "Language", unlock: "Unlock Player", stadium: "Live Stadium", desc: "Global sports coverage in 4K monochrome." },
            es: { browse: "Explorar", live: "En Vivo", schedule: "Calendario", lang: "Idioma", unlock: "Desbloquear", stadium: "Estadio Vivo", desc: "Cobertura deportiva global en 4K." },
            fr: { browse: "Explorer", live: "En Direct", schedule: "Calendrier", lang: "Langue", unlock: "Débloquer", stadium: "Stade Direct", desc: "Couverture sportive mondiale." }
        };

        const Engine = {
            state: {
                view: 'live',
                lang: localStorage.getItem('fm_lang') || 'en',
                raw: [],
                data: [],
                clicks: 0
            },

            async init() {
                lucide.createIcons();
                this.updateClock();
                this.setLang(this.state.lang);
                this.setupSearch();
                await this.loadData();
            },

            updateClock() {
                const t = () => {
                    const d = new Date();
                    document.getElementById('clock').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
                };
                t(); setInterval(t, 10000);
            },

            async loadData() {
                const mount = document.getElementById('grid-mount');
                mount.innerHTML = `<div style="grid-column: 1/-1; padding: 5rem; text-align: center; color: var(--text-dark); font-size: 0.8rem; letter-spacing: 2px;">SYNCING DATA...</div>`;
                
                const endpoint = this.state.view === 'live' ? '/api/matches/live' : '/api/matches/all-today';
                try {
                    const r = await fetch(API_BASE + endpoint);
                    this.state.raw = await r.json();
                    this.state.data = [...this.state.raw];
                    this.render();
                } catch (e) {
                    mount.innerHTML = 'OFFLINE.';
                }
            },

            setView(v) {
                this.state.view = v;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById('nav-' + v)?.classList.add('active');
                this.loadData();
            },

            setLang(l) {
                this.state.lang = l;
                localStorage.setItem('fm_lang', l);
                
                const d = I18N[l];
                document.getElementById('txt-browse').innerText = d.browse;
                document.getElementById('txt-live').innerText = d.live;
                document.getElementById('txt-schedule').innerText = d.schedule;
                document.getElementById('txt-lang').innerText = d.lang;
                document.getElementById('txt-unlock').innerText = d.unlock;
                document.getElementById('view-title').innerText = d.stadium;
                document.getElementById('view-desc').innerText = d.desc;

                document.querySelectorAll('.lang-switch span').forEach(s => s.classList.remove('active'));
                document.getElementById('l-' + l).classList.add('active');
            },

            /* Advanced Image Selection Logic */
            getImage(match) {
                // Priority 1: match.poster (if it's a direct path)
                if (match.poster) {
                    // Check if it's a full URL or a relative path
                    if (match.poster.startsWith('http')) return match.poster;
                    return `${API_BASE}${match.poster}.webp`;
                }

                // Priority 2: Generate Poster from team badges
                if (match.teams?.home?.badge && match.teams?.away?.badge) {
                    return `${API_BASE}/api/images/poster/${match.teams.home.badge}/${match.teams.away.badge}.webp`;
                }

                // Fallback: Default Placeholder
                return `https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=800`;
            },

            render() {
                const mount = document.getElementById('grid-mount');
                mount.innerHTML = '';
                
                this.state.data.forEach((m, i) => {
                    const card = document.createElement('div');
                    card.className = 'fm-card';
                    
                    const poster = this.getImage(m);
                    const homeBadge = `${API_BASE}/api/images/badge/${m.teams?.home?.badge}.webp`;
                    const awayBadge = `${API_BASE}/api/images/badge/${m.teams?.away?.badge}.webp`;

                    card.innerHTML = `
                        <div class="fm-poster-wrap">
                            ${m.live ? '<div class="live-tag">LIVE</div>' : ''}
                            <img src="${poster}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1504450758481-7338eba7524a?w=800'">
                        </div>
                        <div class="fm-info">
                            <div class="fm-cat">${m.category}</div>
                            <div class="fm-teams">
                                <div class="fm-team">
                                    <img src="${homeBadge}" onerror="this.src='${API_BASE}/favicon.ico'">
                                    <span>${m.teams?.home?.name || 'Home'}</span>
                                </div>
                                <div class="fm-team">
                                    <img src="${awayBadge}" onerror="this.src='${API_BASE}/favicon.ico'">
                                    <span>${m.teams?.away?.name || 'Away'}</span>
                                </div>
                            </div>
                        </div>
                    `;

                    card.onclick = () => Cinema.open(m);
                    mount.appendChild(card);
                    
                    // Reveal animation
                    setTimeout(() => card.classList.add('visible'), i * 50);
                });
            },

            setupSearch() {
                document.getElementById('global-search').addEventListener('input', (e) => {
                    const q = e.target.value.toLowerCase();
                    this.state.data = this.state.raw.filter(m => 
                        m.title.toLowerCase().includes(q) || 
                        m.category.toLowerCase().includes(q)
                    );
                    this.render();
                });
            }
        };

        const Cinema = {
            async open(match) {
                const layer = document.getElementById('cinema');
                const mount = document.getElementById('source-mount');
                const title = document.getElementById('active-title');
                
                layer.style.display = 'flex';
                title.innerText = match.title.toUpperCase();
                
                // Reset Ad Shield
                this.clicks = 0;
                document.getElementById('shield').style.display = 'flex';
                document.getElementById('player-mount').innerHTML = '';
                
                mount.innerHTML = '<span style="color:var(--text-dark); font-size:0.7rem;">TUNING FREQUENCIES...</span>';

                try {
                    const base = match.sources[0];
                    const r = await fetch(`${API_BASE}/api/stream/${base.source}/${base.id}`);
                    const streams = await r.json();

                    mount.innerHTML = '';
                    streams.forEach((s, i) => {
                        const btn = document.createElement('button');
                        btn.className = 'src-btn';
                        btn.innerText = s.language || 'Global';
                        btn.onclick = () => this.inject(s.embedUrl, btn);
                        mount.appendChild(btn);
                        if(i === 0) this.inject(s.embedUrl, btn);
                    });
                } catch (e) { mount.innerHTML = 'SIGNAL INTERRUPTED.'; }
            },

            inject(url, btn) {
                document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('player-mount').innerHTML = `<iframe src="${url}" id="player-frame" allowfullscreen></iframe>`;
            },

            unlock() {
                this.clicks++;
                // Most providers trigger ads on the 1st or 2nd click.
                if (this.clicks >= 2) {
                    document.getElementById('shield').style.display = 'none';
                }
            },

            close() {
                document.getElementById('cinema').style.display = 'none';
                document.getElementById('player-mount').innerHTML = '';
            }
        };

        window.onload = () => Engine.init();
    </script>
</body>
</html>
