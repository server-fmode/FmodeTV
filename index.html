<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FmodeTV</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        
        :root {
            --bg-0: #000000;
            --bg-1: #080808;
            --bg-2: #121212;
            --bg-3: #1a1a1a;
            
            --accent: #ffffff;
            --border: #222222;
            --border-focus: #444444;
            
            --text-0: #ffffff;
            --text-1: #a1a1aa;
            --text-2: #71717a;
            --text-3: #3f3f46;
            
            --status-live: #ef4444;
            --status-hd: #22c55e;
            
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.3s var(--ease);
            
            --sidebar-w: 280px;
            --header-h: 70px;
            --radius: 8px;
            --safe-area: 2rem;
        }

        
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-0);
            color: var(--text-0);
            font-family: var(--font-sans);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            user-select: none;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-0); }
        ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 10px; }

        button { border: none; background: none; font-family: inherit; cursor: pointer; color: inherit; }
        input { font-family: inherit; }

        
        #fmode-sidebar {
            width: var(--sidebar-w);
            background: var(--bg-1);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-brand {
            height: var(--header-h);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.05em;
            border-bottom: 1px solid var(--border);
        }

        .nav-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 0.75rem;
        }

        .nav-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-3);
            margin: 1.5rem 1rem 0.5rem;
            font-weight: 700;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            color: var(--text-1);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2px;
            transition: var(--transition);
        }

        .nav-btn:hover, .nav-btn.active {
            color: var(--text-0);
            background: var(--bg-2);
        }

        .nav-btn i { width: 18px; height: 18px; }

        
        #fmode-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-0);
        }

        header {
            height: var(--header-h);
            border-bottom: 1px solid var(--border);
            padding: 0 var(--safe-area);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            z-index: 50;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 480px;
        }

        .search-container i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); color: var(--text-2);
            width: 16px;
        }

        #app-search {
            width: 100%;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 10px 16px 10px 42px;
            color: var(--text-0);
            font-size: 0.85rem;
            transition: var(--transition);
        }

        #app-search:focus { border-color: var(--border-focus); background: var(--bg-3); }

        .header-actions { display: flex; align-items: center; gap: 1.5rem; }

        #main-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--safe-area);
            scroll-behavior: smooth;
        }

        
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.5s var(--ease);
        }

        .match-grid.loaded { opacity: 1; transform: translateY(0); }

        .card {
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: var(--border-focus);
            background: var(--bg-2);
            transform: translateY(-4px);
        }

        .card-visual {
            aspect-ratio: 16/9;
            background: #111;
            position: relative;
            overflow: hidden;
        }

        .card-visual img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.6; transition: 0.5s var(--ease);
        }

        .card:hover .card-visual img { opacity: 1; transform: scale(1.05); }

        .card-body { padding: 1.25rem; }

        .match-info { margin-bottom: 1.25rem; }
        .match-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.25rem; }
        .match-sub { font-size: 0.75rem; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; }

        .team-row {
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
        }

        .team-row img { width: 28px; height: 28px; object-fit: contain; }
        .team-row span { font-size: 0.9rem; font-weight: 500; }

        .card-footer {
            margin-top: auto;
            padding: 0.75rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem;
        }

        .badge {
            font-weight: 700; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem;
        }
        .badge-live { background: var(--status-live); color: white; }
        .badge-time { color: var(--text-2); font-family: var(--font-mono); }

        
        #player-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 2000;
            display: none; flex-direction: column;
        }

        .player-head {
            height: 60px; padding: 0 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg-1);
        }

        .player-body { flex: 1; position: relative; }
        #video-embed { width: 100%; height: 100%; border: none; }

        .source-drawer {
            padding: 1.25rem var(--safe-area);
            background: var(--bg-1);
            display: flex; gap: 10px;
            overflow-x: auto;
            border-top: 1px solid var(--border);
        }

        .src-btn {
            background: var(--bg-2);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            transition: var(--transition);
        }

        .src-btn:hover { border-color: var(--text-1); }
        .src-btn.active { background: var(--text-0); color: var(--bg-0); }
        .src-btn .hd-mark { color: var(--status-hd); margin-left: 6px; font-size: 0.6rem; }

        
        #fmode-settings {
            position: fixed; right: -360px; top: 0;
            width: 360px; height: 100%;
            background: var(--bg-1);
            border-left: 1px solid var(--border);
            z-index: 500;
            padding: 3rem 2rem;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #fmode-settings.open { right: 0; box-shadow: -20px 0 60px rgba(0,0,0,0.8); }

        .setting-group { margin-bottom: 2.5rem; }
        .setting-group label {
            display: block; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-2); margin-bottom: 1rem;
            font-weight: 700;
        }

        .fmode-select {
            width: 100%; background: var(--bg-0); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: var(--radius);
            font-size: 0.9rem;
        }

        
        @media (max-width: 1024px) {
            #fmode-sidebar { display: none; }
            #mobile-tab-bar {
                position: fixed; bottom: 0; left: 0; width: 100%;
                height: 70px; background: rgba(8,8,8,0.9);
                backdrop-filter: blur(20px); border-top: 1px solid var(--border);
                display: flex; justify-content: space-around; align-items: center;
                z-index: 1000;
                padding-bottom: env(safe-area-inset-bottom);
            }
            #fmode-viewport { height: calc(100vh - 70px); }
            header { padding: 0 1.5rem; }
            .search-container { display: none; }
            #main-content { padding: 1.5rem; }
            .match-grid { grid-template-columns: 1fr; }
            #fmode-settings { width: 100%; right: -100%; }
        }

        @media (min-width: 1025px) {
            #mobile-tab-bar { display: none; }
        }

        
        .skeleton {
            background: var(--bg-2);
            position: relative; overflow: hidden;
        }
        .skeleton::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: skeleton-shimmer 1.5s infinite;
        }
        @keyframes skeleton-shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    </style>
</head>
<body>

    <aside id="fmode-sidebar">
        <div class="sidebar-brand">FmodeTV</div>
        <div class="nav-container">
            <div class="nav-section-title" data-i18n="nav_main">Main</div>
            <button class="nav-btn active" data-path="live" onclick="Engine.navigate('live', this)">
                <i data-lucide="radio"></i> <span data-i18n="nav_live">Live Now</span>
            </button>
            <button class="nav-btn" data-path="all-today" onclick="Engine.navigate('all-today', this)">
                <i data-lucide="calendar"></i> <span data-i18n="nav_today">Today's Events</span>
            </button>
            
            <div class="nav-section-title" data-i18n="nav_sports">Sports</div>
            <div id="dynamic-sports-nav"></div>

            <div class="nav-section-title" data-i18n="nav_system">System</div>
            <button class="nav-btn" onclick="UI.toggleSettings()">
                <i data-lucide="sliders-horizontal"></i> <span data-i18n="nav_settings">Settings</span>
            </button>
        </div>
    </aside>

    <main id="fmode-viewport">
        <header>
            <div class="search-container">
                <i data-lucide="search"></i>
                <input type="text" id="app-search" placeholder="Search broadcasts..." oninput="Engine.search(this.value)">
            </div>
            <div class="header-actions">
                <div id="digital-clock" style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-2);"></div>
                <button onclick="UI.toggleSettings()" style="color: var(--text-1);"><i data-lucide="languages" style="width: 20px;"></i></button>
            </div>
        </header>

        <div id="main-content">
            <div class="match-grid" id="grid-mount"></div>
        </div>
    </main>

    <nav id="mobile-tab-bar">
        <button onclick="Engine.navigate('live')"><i data-lucide="radio"></i></button>
        <button onclick="Engine.navigate('all-today')"><i data-lucide="calendar"></i></button>
        <button onclick="UI.toggleSettings()"><i data-lucide="settings"></i></button>
    </nav>

    <div id="player-layer">
        <div class="player-head">
            <div id="p-title-meta" style="font-size: 0.9rem; font-weight: 700; color: var(--text-0);"></div>
            <button onclick="Player.terminate()" style="font-size: 0.75rem; font-weight: 800; background: var(--bg-3); padding: 8px 16px; border-radius: 4px;">CLOSE</button>
        </div>
        <div class="player-body">
            <iframe id="video-embed" allowfullscreen allow="autoplay"></iframe>
        </div>
        <div class="source-drawer" id="source-mount"></div>
    </div>

    <div id="fmode-settings">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
            <h2 style="font-size: 1.5rem; letter-spacing: -0.02em;" data-i18n="set_title">Settings</h2>
            <button onclick="UI.toggleSettings()"><i data-lucide="x" style="width: 24px;"></i></button>
        </div>

        <div class="setting-group">
            <label data-i18n="set_lang">Site Language</label>
            <select class="fmode-select" id="lang-picker" onchange="i18n.set(this.value)">
                <option value="en">English (US)</option>
                <option value="es">Español (ES)</option>
                <option value="fr">Français (FR)</option>
                <option value="ar">العربية (Intl)</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Interface</label>
            <div style="padding: 1rem; background: var(--bg-0); border: 1px solid var(--border); border-radius: 4px; color: var(--text-2); font-size: 0.8rem;">
                FmodeTV
            </div>
        </div>
    </div>

    <script>
        
        const CONFIG = {
            API_ROOT: 'https://streamed.pk/api',
            IMG_ROOT: 'https://streamed.pk/api/images',
            DEFAULT_LANG: 'en'
        };

        const LOCALES = {
            en: {
                nav_main: "Navigation",
                nav_live: "Live Broadcasts",
                nav_today: "Today's Schedule",
                nav_sports: "Disciplines",
                nav_system: "System",
                nav_settings: "Settings",
                set_title: "Preferences",
                set_lang: "Language"
            },
            es: {
                nav_main: "Navegación",
                nav_live: "En Vivo",
                nav_today: "Agenda de Hoy",
                nav_sports: "Disciplinas",
                nav_system: "Sistema",
                nav_settings: "Ajustes",
                set_title: "Preferencias",
                set_lang: "Idioma"
            },
            fr: {
                nav_main: "Navigation",
                nav_live: "En Direct",
                nav_today: "Aujourd'hui",
                nav_sports: "Disciplines",
                nav_system: "Système",
                nav_settings: "Paramètres",
                set_title: "Préférences",
                set_lang: "Langue"
            },
            ar: {
                nav_main: "التنقل",
                nav_live: "البث المباشر",
                nav_today: "جدول اليوم",
                nav_sports: "الرياضات",
                nav_system: "النظام",
                nav_settings: "الإعدادات",
                set_title: "التفضيلات",
                set_lang: "اللغة"
            }
        };

        let state = {
            matches: [],
            categories: [],
            currentFilter: 'live',
            lang: 'en'
        };

       
        const i18n = {
            init() {
                const saved = localStorage.getItem('fmode_lang') || CONFIG.DEFAULT_LANG;
                this.set(saved);
                document.getElementById('lang-picker').value = saved;
            },
            set(code) {
                state.lang = code;
                localStorage.setItem('fmode_lang', code);
                const strings = LOCALES[code];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (strings[key]) el.innerText = strings[key];
                });
                document.dir = (code === 'ar') ? 'rtl' : 'ltr';
            }
        };

        
        const Engine = {
            async init() {
                lucide.createIcons();
                i18n.init();
                this.updateClock();
                await this.loadCategories();
                await this.navigate('live');
            },

            async loadCategories() {
                try {
                    const res = await fetch(`${CONFIG.API_ROOT}/sports`);
                    const data = await res.json();
                    state.categories = data;
                    
                    const mount = document.getElementById('dynamic-sports-nav');
                    mount.innerHTML = data.map(s => `
                        <button class="nav-btn" data-path="${s.id}" onclick="Engine.navigate('${s.id}', this)">
                            <i data-lucide="chevron-right"></i> <span>${s.name}</span>
                        </button>
                    `).join('');
                    lucide.createIcons();
                } catch (e) { console.error("Category Load Fail", e); }
            },

            async navigate(path, element = null) {
                state.currentFilter = path;
                UI.setLoading(true);

                if (element) {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    element.classList.add('active');
                }

                try {
                    const res = await fetch(`${CONFIG.API_ROOT}/matches/${path}`);
                    state.matches = await res.json();
                    this.render(state.matches);
                } catch (e) {
                    console.error("Navigation Fail", e);
                } finally {
                    UI.setLoading(false);
                }
            },

            render(list) {
                const grid = document.getElementById('grid-mount');
                grid.classList.remove('loaded');
                grid.innerHTML = '';

                if (!list.length) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; padding: 4rem; text-align: center; color: var(--text-2);">No active broadcasts found in this category.</div>`;
                    grid.classList.add('loaded');
                    return;
                }

                list.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => Player.initialize(m);

                    const time = new Date(m.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    card.innerHTML = `
                        <div class="card-visual">
                            <img src="${m.poster ? 'https://streamed.pk'+m.poster+'.webp' : 'https://images.unsplash.com/photo-1504450758481-7338eba7524a?q=80&w=800'}" loading="lazy">
                        </div>
                        <div class="card-body">
                            <div class="match-info">
                                <div class="match-title">${m.title}</div>
                                <div class="match-sub">${m.category}</div>
                            </div>
                            <div class="team-row">
                                <img src="${CONFIG.IMG_ROOT}/badge/${m.teams?.home?.badge}.webp" onerror="this.src='${CONFIG.IMG_ROOT}/badge/default.webp'">
                                <span>${m.teams?.home?.name || 'Home'}</span>
                            </div>
                            <div class="team-row">
                                <img src="${CONFIG.IMG_ROOT}/badge/${m.teams?.away?.badge}.webp" onerror="this.src='${CONFIG.IMG_ROOT}/badge/default.webp'">
                                <span>${m.teams?.away?.name || 'Away'}</span>
                            </div>
                        </div>
                        <div class="card-footer">
                            <span class="badge ${m.popular ? 'badge-live' : 'badge-time'}">${m.popular ? 'LIVE' : time}</span>
                            <span style="color: var(--text-2); font-weight:600;">CHANNELS: ${m.sources.length}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                requestAnimationFrame(() => grid.classList.add('loaded'));
            },

            search(val) {
                const q = val.toLowerCase();
                const filtered = state.matches.filter(m => 
                    m.title.toLowerCase().includes(q) || 
                    m.category.toLowerCase().includes(q)
                );
                this.render(filtered);
            },

            updateClock() {
                const el = document.getElementById('digital-clock');
                const tick = () => {
                    const now = new Date();
                    el.innerText = now.toLocaleTimeString();
                };
                setInterval(tick, 1000);
                tick();
            }
        };

        
        const Player = {
            async initialize(match) {
                const layer = document.getElementById('player-layer');
                const head = document.getElementById('p-title-meta');
                const mount = document.getElementById('source-mount');
                
                head.innerText = `${match.title} | ${match.category.toUpperCase()}`;
                mount.innerHTML = `<span class="skeleton" style="width:200px; height:40px; border-radius:4px;"></span>`;
                
                layer.style.display = 'flex';
                
                try {
                    // Waterfall: Match -> Primary Source -> Specific Streams
                    const primary = match.sources[0];
                    if (!primary) throw new Error("No sources");

                    const res = await fetch(`${CONFIG.API_ROOT}/stream/${primary.source}/${primary.id}`);
                    const streams = await res.json();
                    
                    mount.innerHTML = '';
                    streams.forEach((s, i) => {
                        const btn = document.createElement('button');
                        btn.className = `src-btn ${i === 0 ? 'active' : ''}`;
                        btn.innerHTML = `CHANNEL ${s.streamNo} | ${s.language} ${s.hd ? '<span class="hd-mark">HD</span>' : ''}`;
                        btn.onclick = () => this.switchSource(s.embedUrl, btn);
                        mount.appendChild(btn);
                    });

                    if (streams.length) this.switchSource(streams[0].embedUrl);

                } catch (err) {
                    mount.innerHTML = `<span style="color:var(--status-live)">Stream data unavailable for this event.</span>`;
                }
            },

            switchSource(url, btn = null) {
                document.getElementById('video-embed').src = url;
                if (btn) {
                    document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                }
            },

            terminate() {
                document.getElementById('player-layer').style.display = 'none';
                document.getElementById('video-embed').src = '';
            }
        };

       
        const UI = {
            setLoading(isLoading) {
                if (isLoading) {
                    const mount = document.getElementById('grid-mount');
                    mount.innerHTML = Array(8).fill(0).map(() => `
                        <div class="card skeleton" style="height: 320px;"></div>
                    `).join('');
                    mount.classList.add('loaded');
                }
            },
            toggleSettings() {
                document.getElementById('fmode-settings').classList.toggle('open');
            }
        };

        window.addEventListener('DOMContentLoaded', () => Engine.init());

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                Player.terminate();
                if (document.getElementById('fmode-settings').classList.contains('open')) UI.toggleSettings();
            }
        });

    </script>
</body>
</html>
